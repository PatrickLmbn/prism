<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      background: white;
      color: black;
      font-family: sans-serif;
    }
    textarea {
      width: 100%;
      height: 100px;
      border: 2px solid black;
      background: white;
      color: black;
      padding: 5px;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 14px;
    }
    button {
      width: 100%;
      background: black;
      color: white;
      border: 1px solid black;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #333;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 10px;
      border-top: 1px dashed black;
      padding-top: 10px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
      border-bottom: 2px solid black;
      padding-bottom: 5px;
    }
    .toggle-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .toggle-label {
      font-size: 13px;
      color: #333;
    }
    .settings-title {
      font-size: 10px;
      letter-spacing: 1.5px;
      font-weight: 800;
      color: #000;
      margin: 20px 0 12px 0;
      border-bottom: 2px solid #000;
      padding-bottom: 4px;
      text-transform: uppercase;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: black;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
      .settings-title {
        font-size: 10px;
        letter-spacing: 1px;
        font-weight: bold;
        color: #666;
        margin: 15px 0 10px 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
</style>
</head>
<body>
  <div class="title">PRISM</div>
        <div class="toggle-group">
            <span class="toggle-label">Auto-Suggest</span>
            <label class="switch">
                <input type="checkbox" id="autoSuggestToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="settings-title">CORRECTION SETTINGS</div>
        <div style="margin-bottom: 8px; font-size: 13px; color: #333;">Tone</div>
        <select id="toneSelect">
            <option value="Professional">Professional</option>
            <option value="Casual">Casual</option>
            <option value="Academic">Academic</option>
            <option value="Creative">Creative</option>
        </select>

        <div class="toggle-group">
            <span class="toggle-label">Explain Changes</span>
            <label class="switch">
                <input type="checkbox" id="showExplanationsToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="settings-title">SENSITIVE DATA PROTECTION</div>
        
        <div class="toggle-group">
            <span class="toggle-label">Disable on Email Fields</span>
            <label class="switch">
                <input type="checkbox" id="blockEmailToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-group">
            <span class="toggle-label">Disable on Passwords</span>
            <label class="switch">
                <input type="checkbox" id="blockPasswordToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-group">
            <span class="toggle-label">Disable on Sensitive (API Keys etc)</span>
            <label class="switch">
                <input type="checkbox" id="blockSensitiveToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="settings-title">MANUAL TOOLS</div>
        <div class="toggle-group">
            <span class="toggle-label">Enable Manual Correction</span>
            <label class="switch">
                <input type="checkbox" id="showManualToggle">
                <span class="slider"></span>
            </label>
        </div>

  <div id="manualCorrectionSection" style="display: none; border-top: 1px solid #eee; margin-top: 15px; padding-top: 15px;">
    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <button id="correctBtn">CORRECT</button>
    <div id="status" style="font-size: 12px; margin-top: 5px;"></div>
    <div id="resultBlock" class="result" style="display: none;">
      <b>Corrected:</b>
      <div id="outputText"></div>
      <div id="explanationBlock" style="display: none; margin-top: 10px; font-size: 12px; color: #666; border-left: 2px solid #ccc; padding-left: 8px;">
        <b>Why?</b>
        <div id="explanationText"></div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
